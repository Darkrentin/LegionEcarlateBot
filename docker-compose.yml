services:
  legion-bot:
    build: .
    container_name: legion-ecarlate-bot
    restart: always
    env_file:
      - .env
    environment:
      - TOKEN=${TOKEN}
      - API_KEY=${API_KEY}
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 512M